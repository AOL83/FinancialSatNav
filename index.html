<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Financial SatNav™ Live Collision Discovery</title>
<style>
:root{--bg:#05060a;--panel:#0d1220;--cyan:#00e5ff;--green:#39ff88;--yellow:#ffe600;--red:#ff295f;--purple:#b026ff;--muted:#95a8c7;--line:rgba(0,229,255,.3)}
*{box-sizing:border-box}body{margin:0;color:white;font-family:Inter,system-ui,Arial;background:radial-gradient(circle at 20% 0%,rgba(0,229,255,.15),transparent 30%),radial-gradient(circle at 80% 0%,rgba(57,255,136,.12),transparent 25%),#05060a;min-height:100vh}
header{position:sticky;top:0;z-index:2;padding:16px;border-bottom:1px solid var(--line);background:rgba(5,6,10,.86);backdrop-filter:blur(12px)}
h1{margin:0;color:var(--yellow);text-shadow:0 0 12px var(--yellow);font-size:clamp(22px,5vw,38px)}
.sub{color:var(--muted);font-size:13px;margin-top:6px}
.grid{display:grid;grid-template-columns:1fr;gap:12px;padding:12px;max-width:1500px;margin:auto}
.panel{background:rgba(13,18,32,.82);border:1px solid rgba(0,229,255,.25);border-radius:18px;padding:14px;box-shadow:0 0 28px rgba(0,229,255,.08)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{padding:12px;border-radius:14px;background:#0f1628;border:1px solid rgba(255,230,0,.2);min-height:90px}.metric span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.metric b{display:block;font-size:clamp(22px,5vw,32px);color:var(--cyan);margin-top:5px}
button,input{width:100%;padding:10px;border-radius:12px;background:#0e1626;color:white;border:1px solid rgba(0,229,255,.3);outline:none;margin:4px 0}button{background:linear-gradient(90deg,var(--cyan),var(--green));color:#031018;font-weight:900;cursor:pointer}.secondary{background:#0e1626;color:var(--cyan)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.badge{display:inline-block;border:1px solid rgba(255,230,0,.35);border-radius:999px;padding:3px 8px;color:var(--yellow);font-size:11px;margin:2px}
.card{border:1px solid rgba(0,229,255,.25);border-radius:14px;background:#08101d;padding:12px;margin:10px 0}.card.high{border-color:var(--red);box-shadow:0 0 14px rgba(255,41,95,.22)}.card.medium{border-color:var(--yellow)}.card.low{border-color:var(--green)}
pre{white-space:pre-wrap;color:#dbeafe;line-height:1.45;max-height:420px;overflow:auto}
.timeline{height:280px;border-radius:16px;position:relative;overflow:auto;background:#08101d;border:1px solid rgba(0,229,255,.22)}
.line{position:absolute;left:30px;top:140px;width:7600px;height:4px;background:linear-gradient(90deg,var(--cyan),var(--green),var(--yellow),var(--red));box-shadow:0 0 20px var(--cyan)}
.event{position:absolute;top:140px;transform:translateY(-50%);padding:8px 12px;border-radius:999px;background:#111c33;border:1px solid var(--yellow);box-shadow:0 0 15px var(--yellow);white-space:nowrap;font-size:12px}
canvas{width:100%;height:275px;background:#08101d;border:1px solid rgba(0,229,255,.22);border-radius:16px}
@media(min-width:900px){.grid{grid-template-columns:390px 1fr}.metrics{grid-template-columns:repeat(4,1fr)}}@media(max-width:520px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>FINANCIAL SATNAV™ LIVE DISCOVERY</h1><div class="sub">World Event Discovery → Event Classification → Collision Objects → Route Engine</div></header>
<div class="grid">
<aside>
<section class="panel">
<h2>Vehicle Exposure</h2>
<label>Starting reserve</label><input id="reserve" type="number" value="1500">
<label>Monthly income</label><input id="income" type="number" value="2500">
<div class="row"><div><label>Food</label><input id="Food" value="520" type="number"></div><div><label>Utilities</label><input id="Utilities" value="210" type="number"></div></div>
<div class="row"><div><label>Housing</label><input id="Housing" value="950" type="number"></div><div><label>Transport</label><input id="Transport" value="220" type="number"></div></div>
<div class="row"><div><label>Debt</label><input id="Debt" value="120" type="number"></div><div><label>Insurance</label><input id="Insurance" value="95" type="number"></div></div>
<div class="row"><div><label>Subscriptions</label><input id="Subscriptions" value="45" type="number"></div><div><label>Other</label><input id="Other" value="180" type="number"></div></div>
<button onclick="App.discover(true)">DISCOVER LIVE COLLISIONS</button>
<button class="secondary" onclick="App.discover(false)">USE CACHE</button>
</section>
<section class="panel"><h2>Sources</h2><div id="sources"></div></section>
</aside>
<main>
<section class="metrics">
<div class="metric"><span>Detected</span><b id="detected">0</b></div>
<div class="metric"><span>High Risk</span><b id="highRisk">0</b></div>
<div class="metric"><span>Survival</span><b id="survival">0%</b></div>
<div class="metric"><span>Power Loss</span><b id="powerLoss">£0</b></div>
</section>
<section class="panel"><h2>Detected Collision Objects</h2><div id="collisions"></div></section>
<section class="panel"><h2>Timeline Collision Markers</h2><div class="timeline" id="timeline"><div class="line"></div></div></section>
<section class="panel"><h2>Purchasing Power Impact</h2><canvas id="chart" width="900" height="300"></canvas></section>
<section class="panel"><h2>Collision Report</h2><pre id="report"></pre></section>
</main>
</div>
<script>
const App={
state:{collisions:[],historical:[],sources:[],timeline:[],routes:[]},
money(n){return"£"+Number(n||0).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2})},
exposure(){return{Food:+Food.value||0,Utilities:+Utilities.value||0,Housing:+Housing.value||0,Transport:+Transport.value||0,Debt:+Debt.value||0,Insurance:+Insurance.value||0,Subscriptions:+Subscriptions.value||0,Other:+Other.value||0}},
async discover(force){
detected.textContent="...";collisions.innerHTML="<div class='card'>Fetching live sources through backend acquisition layer...</div>";
const res=await fetch(`/api/collisions/discover${force?"?force=1":""}`);
const data=await res.json();
if(data.error){collisions.innerHTML=`<div class='card high'>${data.error}</div>`;return}
this.state.collisions=data.collisions||[];this.state.historical=data.historical||[];this.state.sources=data.sources||[];
this.simulate();this.render();
},
impact(c){const ex=this.exposure();return c.affectedCategories.reduce((s,k)=>s+(ex[k]||0)*(c.impactPct/100)*(c.probability/100),0)},
simulate(){
const ex=this.exposure(), base=Object.values(ex).reduce((s,v)=>s+v,0), monthlyIncome=+income.value||0;
let reserveVal=+reserve.value||0;const start=new Date();const timeline=[];
for(let m=0;m<12;m++){const d=new Date(start);d.setMonth(d.getMonth()+m);reserveVal+=monthlyIncome-base;timeline.push({type:"route",date:d,label:"Monthly route check",amount:monthlyIncome-base,reserve:reserveVal})}
this.state.collisions.forEach(c=>{const d=new Date(start);d.setDate(d.getDate()+(c.windowDays||90));const loss=this.impact(c);reserveVal-=loss;timeline.push({type:"collision",date:d,label:c.event,amount:-loss,reserve:reserveVal,collision:c})});
timeline.sort((a,b)=>a.date-b.date);let running=+reserve.value||0;timeline.forEach(t=>{running+=t.amount;t.reserve=running});this.state.timeline=timeline;
},
render(){
const high=this.state.collisions.filter(c=>c.severity>=70||c.probability>=70).length;
const totalLoss=this.state.collisions.reduce((s,c)=>s+this.impact(c)*12,0);
const end=this.state.timeline.at(-1)?.reserve||0;const survival=Math.round(Math.max(1,Math.min(99,70+(end/50)-(totalLoss/180))));
detected.textContent=this.state.collisions.length;highRisk.textContent=high;survival.textContent=survival+"%";powerLoss.textContent=this.money(totalLoss);
sources.innerHTML=this.state.sources.map(s=>`<div class="card ${s.ok?'low':'high'}"><b>${s.name}</b><br><span class="badge">${s.type}</span><span class="badge">${s.ok?'OK':'FAIL '+s.status}</span><br><small>${s.url}</small></div>`).join("");
collisions.innerHTML=this.state.collisions.map(c=>`<div class="card ${c.severity>=75?'high':c.severity>=55?'medium':'low'}"><h3>⚠ ${c.event}</h3><span class="badge">${c.source}</span><span class="badge">Severity ${c.severity}</span><span class="badge">Probability ${c.probability}%</span><span class="badge">Validation ${Math.round((c.validationScore||0)*100)}%</span><p>${c.description}</p><b>Impact:</b> ${this.money(this.impact(c))}/month<br><b>Affected:</b> ${c.affectedCategories.join(", ")}<details><summary>Evidence</summary>${(c.evidence||[]).map(e=>`<p><b>${e.sourceName}</b><br>${e.title}<br><small>${e.url}</small><br>${e.snippet}</p>`).join("")}</details></div>`).join("")||"<div class='card high'>No live collisions discovered from available sources.</div>";
this.renderTimeline();this.drawChart();this.report();
},
renderTimeline(){timeline.innerHTML='<div class="line"></div>';this.state.timeline.forEach((e,i)=>{const div=document.createElement("div");div.className="event";div.style.left=(40+i*140)+"px";div.style.top=(i%2?190:100)+"px";div.textContent=`${e.date.toLocaleDateString()} ${e.type==="collision"?"⚠ ":""}${e.label} ${this.money(e.amount)}`;timeline.appendChild(div)})},
drawChart(){const ctx=chart.getContext("2d"),w=chart.width,h=chart.height;ctx.clearRect(0,0,w,h);ctx.fillStyle="#08101d";ctx.fillRect(0,0,w,h);const cats={};this.state.collisions.forEach(c=>c.affectedCategories.forEach(k=>cats[k]=(cats[k]||0)+this.impact(c)));const rows=Object.entries(cats).sort((a,b)=>b[1]-a[1]);const max=Math.max(1,...rows.map(r=>r[1]));ctx.font="13px Arial";rows.forEach(([name,val],i)=>{const y=30+i*30,bw=(w-170)*(val/max);ctx.fillStyle="#95a8c7";ctx.fillText(name,10,y+16);ctx.fillStyle=i<2?"#ff295f":"#00e5ff";ctx.fillRect(130,y,bw,20);ctx.fillStyle="#f5fbff";ctx.fillText(this.money(val)+"/m",140+bw,y+16)})},
report(){report.textContent=`FINANCIAL SATNAV LIVE DISCOVERY REPORT

Generated: ${new Date().toISOString()}
Live sources checked: ${this.state.sources.length}
Collision objects discovered: ${this.state.collisions.length}

Detected collisions:
${this.state.collisions.map(c=>`- ${c.event}
  Source engine: ${c.source}
  Severity: ${c.severity}
  Probability: ${c.probability}%
  Validation: ${Math.round((c.validationScore||0)*100)}%
  Affected: ${c.affectedCategories.join(", ")}
  Monthly impact: ${this.money(this.impact(c))}
  Evidence count: ${(c.evidence||[]).length}
`).join("\n")}

Timeline:
${this.state.timeline.map(t=>`${t.date.toDateString()} | ${t.type} | ${t.label} | ${this.money(t.amount)} | reserve ${this.money(t.reserve)}`).join("\n")}`;}
};
App.discover(false);
</script>
</body>
</html>
